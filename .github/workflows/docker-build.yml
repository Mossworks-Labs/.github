name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name (e.g., studio, mcp-storytelling)"
        type: string
        required: true
      context:
        description: "Docker build context"
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile path"
        type: string
        default: "Dockerfile"
      registry:
        description: "Container registry"
        type: string
        default: "ghcr.io"
      image-prefix:
        description: "Image prefix (org/repo)"
        type: string
        default: "vibesmiths"
      source-changed:
        description: "Whether source paths for this image changed. When false (and pushing to default branch), the job pulls :latest and retags as :<sha> instead of rebuilding — :latest reflects the unchanged source so retagging is equivalent to a rebuild."
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build — ${{ inputs.image-name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        if: inputs.source-changed

      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-prefix }}/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        if: inputs.source-changed
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Retag :latest as :<sha> (no source change)
        if: ${{ !inputs.source-changed && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        run: |
          set -euo pipefail
          IMAGE="${{ inputs.registry }}/${{ inputs.image-prefix }}/${{ inputs.image-name }}"
          NEW_SHA="$(git rev-parse --short HEAD)"
          echo "Retagging $IMAGE:latest as $IMAGE:$NEW_SHA (source unchanged)"
          docker pull "$IMAGE:latest"
          docker tag "$IMAGE:latest" "$IMAGE:$NEW_SHA"
          docker push "$IMAGE:$NEW_SHA"

      - name: Summary
        run: |
          MODE="built"
          if [ "${{ inputs.source-changed }}" = "false" ]; then MODE="retagged from :latest"; fi
          echo "### Docker — ${{ inputs.image-name }} ($MODE)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

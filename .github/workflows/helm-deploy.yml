name: Helm Deploy

on:
  workflow_call:
    inputs:
      release-name:
        description: "Helm release name"
        type: string
        default: "craft"
      chart-path:
        description: |
          Path to a local chart on disk. Used when `chart-repo` is empty
          (legacy in-repo chart layout). Ignored when `chart-repo` is set.
        type: string
        default: "./helm/craft"
      chart-repo:
        description: |
          Optional Helm chart repository URL. When set, the workflow runs
          `helm repo add` + `helm repo update` against this URL and installs
          `<alias>/<chart-name>` instead of a local path. Use this for charts
          published to a registry (e.g. https://mossworks-labs.github.io/helm-charts/).
        type: string
        default: ""
      chart-name:
        description: |
          Chart name within `chart-repo`. Defaults to `release-name`. Only
          used when `chart-repo` is set.
        type: string
        default: ""
      chart-version:
        description: |
          Optional chart version pin (e.g. "0.1.0"). Only used when
          `chart-repo` is set. Empty = latest.
        type: string
        default: ""
      values-file:
        description: "Values file for deployment"
        type: string
        default: "helm/craft/values-dev.yaml"
      image-prefix:
        description: "GHCR image prefix"
        type: string
        default: "ghcr.io/vibesmiths"
      images:
        description: "Space-separated list of image names to import"
        type: string
        default: "studio frontend"
      containerd-socket:
        description: "Path to containerd socket"
        type: string
        default: "/run/containerd/containerd.sock"
      environment:
        description: "GitHub environment name (matches DNS hostname)"
        type: string
        default: "dev.local.rudolphhome.com"
    secrets:
      KUBECONFIG_DATA:
        description: "Base64-encoded kubeconfig. If unset, falls back to /etc/rancher/k3s/k3s.yaml on the runner."
        required: false
      VALUES_FILE_DATA:
        description: "Base64-encoded contents of the values file. If set, written to the values-file path before helm upgrade (gitignored values files live here)."
        required: false

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Materialize kubeconfig
        id: kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          if [ -n "$KUBECONFIG_DATA" ]; then
            KCFG="$RUNNER_TEMP/kubeconfig"
            echo "$KUBECONFIG_DATA" | base64 -d > "$KCFG"
            chmod 600 "$KCFG"
            echo "path=$KCFG" >> "$GITHUB_OUTPUT"
            echo "needs_sudo=false" >> "$GITHUB_OUTPUT"
          else
            echo "path=/etc/rancher/k3s/k3s.yaml" >> "$GITHUB_OUTPUT"
            echo "needs_sudo=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Materialize values file
        env:
          VALUES_FILE_DATA: ${{ secrets.VALUES_FILE_DATA }}
        run: |
          if [ -n "$VALUES_FILE_DATA" ]; then
            mkdir -p "$(dirname "${{ inputs.values-file }}")"
            echo "$VALUES_FILE_DATA" | base64 -d > "${{ inputs.values-file }}"
          fi

      - name: Import images to k3s
        run: |
          TAG=$(git rev-parse --short HEAD)
          for svc in ${{ inputs.images }}; do
            echo "Importing $svc:$TAG..."
            docker pull ${{ inputs.image-prefix }}/$svc:$TAG || true
            docker save ${{ inputs.image-prefix }}/$svc:$TAG | \
              sudo k3s ctr -a ${{ inputs.containerd-socket }} images import - 2>/dev/null || true
          done

      - name: Resolve chart reference
        id: chart
        env:
          CHART_REPO: ${{ inputs.chart-repo }}
          CHART_NAME: ${{ inputs.chart-name }}
          CHART_VERSION: ${{ inputs.chart-version }}
          CHART_PATH: ${{ inputs.chart-path }}
          RELEASE_NAME: ${{ inputs.release-name }}
        run: |
          if [ -n "$CHART_REPO" ]; then
            # Registry mode: pull from a Helm chart repo URL
            chart_name="${CHART_NAME:-$RELEASE_NAME}"
            helm repo add helm-deploy-source "$CHART_REPO"
            helm repo update helm-deploy-source
            ref="helm-deploy-source/$chart_name"
            version_flag=""
            if [ -n "$CHART_VERSION" ]; then
              version_flag="--version $CHART_VERSION"
            fi
            echo "ref=$ref" >> "$GITHUB_OUTPUT"
            echo "version_flag=$version_flag" >> "$GITHUB_OUTPUT"
            echo "Resolved chart: $ref ${version_flag:-(latest)}"
          else
            # Legacy local-path mode
            echo "ref=$CHART_PATH" >> "$GITHUB_OUTPUT"
            echo "version_flag=" >> "$GITHUB_OUTPUT"
            echo "Resolved chart: $CHART_PATH (local)"
          fi

      - name: Helm upgrade
        env:
          KUBECONFIG_PATH: ${{ steps.kubeconfig.outputs.path }}
          NEEDS_SUDO: ${{ steps.kubeconfig.outputs.needs_sudo }}
          CHART_REF: ${{ steps.chart.outputs.ref }}
          VERSION_FLAG: ${{ steps.chart.outputs.version_flag }}
        run: |
          TAG=$(git rev-parse --short HEAD)
          if [ "$NEEDS_SUDO" = "true" ]; then
            SUDO="sudo"
          else
            SUDO=""
          fi
          $SUDO env KUBECONFIG="$KUBECONFIG_PATH" \
            helm upgrade --install ${{ inputs.release-name }} "$CHART_REF" $VERSION_FLAG \
            -f ${{ inputs.values-file }} \
            --set image.tag=$TAG \
            --set global.hostname=${{ vars.DEPLOY_HOSTNAME }} \
            --wait --timeout 5m

      - name: Summary
        run: |
          TAG=$(git rev-parse --short HEAD)
          echo "### Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed \`$TAG\` to \`${{ vars.DEPLOY_HOSTNAME }}\`" >> "$GITHUB_STEP_SUMMARY"
